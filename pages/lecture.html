<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASK Training – Bài giảng</title>
  <link rel="icon" href="../assets/logo.png" type="image/png" />

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/lecture.css" />
</head>
<body class="bg-light">

  <header class="lecture-header d-flex align-items-center px-4" style="background-color: #E50000;">
    <div class="d-flex align-items-center gap-4">
      <div class="bg-white rounded px-2 py-1 d-flex align-items-center shadow-sm">
        <img src="../assets/logo.png" alt="ASK Logo" height="45" />
      </div>
      <div class="vr bg-white opacity-50"></div>
      <a href="courses.html" id="headerBackLink" class="text-white text-decoration-none d-flex align-items-center fw-medium header-back-link lh-1">
        <i class="bi bi-chevron-left me-2"></i> Đang tải...
      </a>
    </div>
  </header>

  <main class="container-fluid py-4 px-xl-5">
    <div class="row g-4">
      
      <!-- Left Column: Video & Info -->
      <div class="col-12 col-lg-8">
        <!-- Video Player / Placeholder -->
        <div class="video-container rounded-3 overflow-hidden bg-white mb-4 shadow-sm" style="border: 1px solid #f0f0f0;">
          <iframe id="videoPlayer" width="100%" height="500" src="https://youtu.be/dQw4w9WgXcQ?list=RDdQw4w9WgXcQ" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </div>
        
        <!-- Course Title -->
        <h3 id="videoTitle" class="fw-bold mb-4 text-dark fs-4">Video1</h3>

        <!-- Description Card -->
        <div class="card border-0 shadow-sm desc-card" style="border: 1px solid #f0f0f0 !important;">
          <div class="card-body p-4">
            <h5 class="text-danger fw-semibold mb-3 fs-6">Mô tả ngắn</h5>
            <p id="courseDescription" class="text-muted mb-0" style="font-size: 0.95rem;">Đang tải...</p>
          </div>
        </div>
      </div>

      <!-- Right Column: Playlist/Content -->
      <div class="col-12 col-lg-4">
        <div class="card border-0 shadow-sm playlist-card" style="border: 1px solid #f0f0f0 !important;">
            <!-- Card Header -->
          <div class="card-header bg-white border-bottom p-4 d-flex justify-content-between align-items-center">
            <h6 class="mb-0 fw-bold fs-6">Nội dung khóa học</h6>
            <span id="courseProgressText" class="text-muted" style="font-size: 0.8rem;">Đang tải...</span>
          </div>

          <!-- Card Body / Accordion -->
          <div class="card-body p-2 p-md-0">
            <div class="accordion accordion-flush" id="courseAccordion">
              <!-- Rendered via HTML / Javascript -->
              <div class="p-4 text-center text-muted">
                Đang tải nội dung...
              </div>
            </div>
          </div>
        </div>
      </div>
      
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../scripts/lecture.js"></script>
</body>
</html>
