<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASK Training – Bài giảng</title>
  <link rel="icon" href="../assets/logo.png" type="image/png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/common.css" />
  <link rel="stylesheet" href="../styles/lecture.css" />
</head>
<body>
  <div class="market-header">
    <span class="market-brand">envato market</span>
    <button class="btn market-btn">Buy now</button>
  </div>

  <div class="lecture-shell">
    <aside id="sidebar" class="lecture-sidebar">
      <div class="sidebar-logo">
        <a href="dashboard.html" class="d-inline-flex align-items-center gap-2 text-decoration-none">
          <img src="../assets/logo.png" alt="ASK" />
        </a>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a>
        <a href="courses.html" class="nav-link active"><i class="bi bi-journal-bookmark"></i><span>Courses</span></a>
        <a href="#" class="nav-link"><i class="bi bi-people"></i><span>Students</span></a>
        <a href="#" class="nav-link"><i class="bi bi-card-checklist"></i><span>Assignments</span></a>
        <a href="#" class="nav-link"><i class="bi bi-person-badge"></i><span>Mentors</span></a>
        <a href="#" class="nav-link"><i class="bi bi-folder2-open"></i><span>Resources</span></a>
        <a href="#" class="nav-link"><i class="bi bi-chat-dots"></i><span>Messages</span></a>
        <a href="#" class="nav-link"><i class="bi bi-bar-chart"></i><span>Analytics</span></a>
      </nav>
    </aside>

    <section class="lecture-main">
      <header id="topbar" class="lecture-topbar">
        <button class="topbar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
        <div class="lecture-search">
          <i class="bi bi-search"></i>
          <input type="text" placeholder="Search..." aria-label="Search" />
        </div>
        <div class="lecture-topbar-actions">
          <button class="icon-btn"><i class="bi bi-bell"></i></button>
          <button class="icon-btn"><i class="bi bi-globe2"></i></button>
          <button class="profile-btn">
            <i class="bi bi-person-circle"></i>
            <span>hv_ask</span>
            <i class="bi bi-chevron-down"></i>
          </button>
        </div>
      </header>

      <main class="lecture-content">
        <div class="breadcrumb-wrap">
          <span>Home</span>
          <i class="bi bi-chevron-right"></i>
          <a id="headerBackLink" href="courses.html">Course Details</a>
        </div>

        <div class="content-grid">
          <div class="video-column">
            <section class="video-card">
              <span class="live-badge">Live</span>
              <iframe id="videoPlayer" src="" title="Video bài giảng" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </section>

            <h3 id="videoTitle" class="video-title">Đang tải video...</h3>

            <section class="discussion-card">
              <div class="discussion-header">
                <h4>Questions (85)</h4>
                <button class="see-all-btn">See All</button>
              </div>
              <div class="discussion-item">
                <div class="avatar-dot">A</div>
                <div class="discussion-text">
                  <strong>Amir Hamja</strong>
                  <p>How can I improve memory retention after each lesson?</p>
                </div>
              </div>
            </section>

            <section class="description-card">
              <h5>Mô tả ngắn</h5>
              <p id="courseDescription">Đang tải...</p>
            </section>
          </div>

          <div class="lesson-column">
            <section class="lesson-card">
              <div class="lesson-header">
                <div>
                  <h4>Your Lesson</h4>
                  <span id="courseProgressText">Đang tải...</span>
                </div>
                <span class="lesson-count">3/35</span>
              </div>
              <div class="progress custom-progress">
                <div id="courseProgressBar" class="progress-bar" role="progressbar" style="width: 0%" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
              </div>
              <div id="courseAccordion" class="lesson-list">
                <div class="empty-lesson">Đang tải nội dung...</div>
              </div>
            </section>
          </div>
        </div>
      </main>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../scripts/common.js"></script>
  <script src="../scripts/lecture.js"></script>
</body>
</html>
