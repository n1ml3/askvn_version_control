<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASK Training – Quên mật khẩu</title>
    <link rel="icon" href="../assets/logo.png" type="image/png" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../styles/dashboard.css" />
    <link rel="stylesheet" href="../styles/auth.css" />
  </head>

  <body class="auth-page">
    <div class="auth-left">
      <img src="../assets/Group-45926-2.png" alt="ASK Banner" />
    </div>

    <div class="auth-right">
      <a href="login.html" class="auth-back-btn" title="Quay lại"
        ><i class="bi bi-arrow-left"></i
      ></a>

      <div class="auth-form-wrapper">
        <h1 class="auth-title">Quên mật khẩu?</h1>

        <p class="auth-subtitle">
          Nhập số điện thoại của bạn để đặt lại mật khẩu.
        </p>

        <form action="login.html" method="GET">
          <div class="auth-input-group">
            <input
              type="text"
              class="auth-input"
              placeholder="Số điện thoại"
              required
            />
          </div>

          <button type="submit" class="auth-btn">GỬI MÃ OTP</button>

          <div class="auth-switch">
            Quay lại <a href="login.html">Đăng nhập</a>
          </div>
        </form>
      </div>
    </div>

    <script src="../scripts/auth.js"></script>
  </body>
</html>
