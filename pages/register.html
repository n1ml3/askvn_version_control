<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASK Training – Đăng ký</title>
  <link rel="icon" href="../assets/logo.png" type="image/png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../styles/dashboard.css" />
  <link rel="stylesheet" href="../styles/auth.css" />
</head>

<body class="auth-page">

  <div class="auth-left">
    <img src="../assets/Group-45926-2.png" alt="ASK Banner" />
  </div>

  <div class="auth-right">
    <a href="dashboard.html" class="auth-back-btn" title="Quay lại"><i class="bi bi-arrow-left"></i></a>

    <div class="auth-form-wrapper">
      <h1 class="auth-title">Welcome!</h1>
      <p class="auth-subtitle">Tạo tài khoản mới để bắt đầu học với ASK.</p>

      <form action="dashboard.html" method="GET">
        <div class="auth-input-group">
          <input type="text" class="auth-input" placeholder="Họ và tên" required />
        </div>

        <div class="auth-input-group">
          <input type="text" class="auth-input" placeholder="Số điện thoại" required />
        </div>

        <div class="auth-input-group">
          <input type="email" class="auth-input" placeholder="Email (Tuỳ chọn)" />
        </div>

        <div class="auth-input-group">
          <input type="password" class="auth-input" placeholder="Mật khẩu" required />
          <button type="button" class="auth-password-toggle" tabindex="-1" title="Hiện mật khẩu">
            <i class="bi bi-eye"></i>
          </button>
        </div>

        <button type="submit" class="auth-btn mt-4">ĐĂNG KÝ</button>

        <div class="auth-switch">
          Bạn đã có tài khoản? <a href="login.html">Đăng nhập</a>
        </div>
      </form>
    </div>
  </div>

  <script src="../scripts/auth.js"></script>
</body>

</html>
